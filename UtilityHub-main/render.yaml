services:
  # Backend FastAPI Service
  - type: web
    name: anti-gravity-backend
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anti-gravity-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend React Service
  - type: web
    name: anti-gravity-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: VITE_API_URL
        value: https://anti-gravity-backend-xhiz.onrender.com/api/v1

databases:
  # PostgreSQL Database
  - name: anti-gravity-db
    databaseName: utilityhub
    user: utilityhub_user
    plan: free
