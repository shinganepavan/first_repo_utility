name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN_PASS }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/final_repo_for_utility:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/final_repo_for_utility:latest